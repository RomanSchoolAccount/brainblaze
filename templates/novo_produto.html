<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Novo Produto | BrainBlaze</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body id="BHPanel" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="grid-card" style="width:450px; padding:30px; background:#111; border-radius:8px; border:1px solid #333;">
        <h2 style="color:white; margin-top:0;">Lançar Novo Artigo</h2>
        <form action="/Panel/Produtos/Novo" method="POST" enctype="multipart/form-data" style="display:flex; flex-direction:column; gap:15px;">
            <div>
                <label style="color:white; display:block; margin-bottom:5px;">Nome do Produto</label>
                <input type="text" name="nome" required style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#222; color:white;">
            </div>
            <div>
                <label style="color:white; display:block; margin-bottom:5px;">Descrição</label>
                <textarea name="descricao" rows="3" style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#222; color:white; resize:none;"></textarea>
            </div>
            <div style="display:flex; gap:10px;">
                <div style="flex:1;">
                    <label style="color:white; display:block; margin-bottom:5px;">Preço (€)</label>
                    <input type="number" step="0.01" name="preco" required style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#222; color:white;">
                </div>
                <div style="flex:1;">
                    <label style="color:white; display:block; margin-bottom:5px;">Stock Inicial</label>
                    <input type="number" name="stock" value="0" required style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#222; color:white;">
                </div>
            </div>
           <div>
                <label style="color:white; display:block; margin-bottom:5px;">Categoria do Produto</label>
                <select name="categoria_id" style="width:100%; padding:8px; border-radius:4px; border:1px solid #444; background:#222; color:white;" required>
                    <option value="">Selecione uma Categoria...</option>
                    {% for id, nome in categorias.items() %}
                        <option value="{{ id }}">{{ nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="color:white; display:block; margin-bottom:5px;">Imagem do Produto</label>
                <input type="file" name="imagem" accept="image/*" required style="color:white;">
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="submit" style="flex:1; background:#ff6b00; border:none; padding:10px; border-radius:4px; color:white; font-weight:bold; cursor:pointer;">Lançar</button>
                <a href="/Panel/Produtos" style="flex:1; background:#333; color:white; text-align:center; padding:10px; border-radius:4px; text-decoration:none;">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
